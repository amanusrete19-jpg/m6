<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CineStream — Watch Movies & TV</title>
  <meta name="description" content="CineStream — stream trending movies and TV shows powered by TMDB." />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='28' fill='%23e50914'/><circle cx='32' cy='32' r='6' fill='%230b0b0b'/></svg>" />
  <style>
    /* ===== Reset & Variables ===== */
    :root {
      --bg: #0b0b0b;
      --panel: #141414;
      --card: #1b1b1b;
      --text: #f5f5f5;
      --muted: #9aa0a6;
      --primary: #e50914;
      --primary-2: #ff2a36;
      --ring: rgba(229,9,20,.45);
      --glass: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.08);
      --shadow: 0 20px 60px -20px rgba(229,9,20,.45);
      --radius: 12px;
      --transition: 0.25s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Inter, Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    /* ===== Navbar ===== */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(11,11,11,.7);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      gap: 24px;
      height: 64px;
      flex-wrap: wrap;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: .4px;
    }
    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--primary-2), var(--primary) 60%, #7a0410);
      box-shadow: 0 0 24px var(--ring);
    }
    .nav-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .nav-link {
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
      transition: background var(--transition), color var(--transition);
    }
    .nav-link:hover { color: #fff; background: var(--glass); }
    .nav-link.active { color: #fff; background: var(--glass); }
    .search {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      min-width: 200px;
      flex: 1 1 auto;
    }
    .search input {
      background: transparent;
      border: 0;
      outline: 0;
      color: inherit;
      width: 100%;
      font-size: 14px;
    }
    .search input::placeholder { color: var(--muted); }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      height: 78vh;
      min-height: 520px;
      overflow: hidden;
    }
    .hero-slide {
     position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none; /* Prevents clicking invisible slides */
  visibility: hidden;   /* Removes invisible slides from screen readers */
  transition: opacity 1s ease, visibility 1s;
    }
    .hero-slide.active { 
      opacity: 1;
  pointer-events: auto; /* Re-enables clicking for the active slide */
  visibility: visible;
    }
    .hero-grad {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(11,11,11,.2), rgba(11,11,11,.6) 60%, #0b0b0b 100%),
        linear-gradient(90deg, rgba(11,11,11,.85), transparent 60%);
    }
    .hero-inner {
      position: relative;
      height: 100%;
      display: flex;
      align-items: flex-end;
      padding-bottom: 64px;
    }
    .hero-card { max-width: 640px; }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--primary-2);
      font-weight: 700;
    }
    .hero h1 {
      font-size: clamp(28px, 4.4vw, 52px);
      line-height: 1.05;
      margin: 10px 0 12px;
      font-weight: 800;
    }
    .hero p { color: #dcdcdc; max-width: 600px; }
    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      margin: 10px 0 18px;
    }
    .meta .pill {
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--glass);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      transition: transform var(--transition), background var(--transition);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-2), var(--primary));
      color: #fff;
      box-shadow: var(--shadow);
    }
    .btn-ghost {
      background: var(--glass);
      border: 1px solid var(--border);
      color: #fff;
    }
    .hero-dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .hero-dots button {
      width: 24px;
      height: 3px;
      background: rgba(255,255,255,.25);
      border-radius: 3px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .hero-dots button.active { background: var(--primary); }

    /* ===== Rows ===== */
    .row {
      margin: 36px 0;
    }
    .row-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 20px;
      max-width: 1280px;
      margin: 0 auto 12px;
    }
    .row-head h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .row-scroller {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding: 6px 20px 18px;
      scroll-behavior: smooth;
    }
    .card {
      flex: 0 0 auto;
      width: 180px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }
    .card .poster {
      aspect-ratio: 2/3;
      background: #222 center/cover no-repeat;
      position: relative;
    }
    .card .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card .info {
      padding: 10px 12px;
    }
    .card .title {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .sub {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      margin-top: 3px;
    }
    .badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }

    /* ===== Grid Pages ===== */
    .page { padding: 30px 0 80px; }
    .page h1 { font-size: 30px; margin: 0 0 6px; font-weight: 800; }
    .page .sub { color: var(--muted); margin-bottom: 20px; }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .chip {
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    .chip.active {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
    }
    .load-more {
      display: block;
      margin: 30px auto 0;
      padding: 12px 30px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }
    .load-more:hover { background: var(--border); }

    /* ===== Detail ===== */
    .detail-bg {
      position: relative;
      height: 60vh;
      min-height: 420px;
      overflow: hidden;
    }
    .detail-bg .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .detail-bg .grad {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(11,11,11,.3), #0b0b0b 90%);
    }
    .detail-inner {
      max-width: 1280px;
      margin: -160px auto 0;
      padding: 0 20px;
      position: relative;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 28px;
    }
    .detail-poster {
      aspect-ratio: 2/3;
      border-radius: 14px;
      background: #222 center/cover no-repeat;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .detail h1 { font-size: 34px; margin: 10px 0 8px; font-weight: 800; }
    .cast { color: var(--muted); font-size: 13px; margin-top: 10px; }
    @media (max-width: 720px) {
      .detail-inner { grid-template-columns: 1fr; }
      .detail-poster { max-width: 200px; }
    }

    /* ===== Player ===== */
    .player-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }
    .player {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .player .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
      flex-direction: column;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Skeleton ===== */
    .skeleton {
      background: linear-gradient(90deg, #181818, #222 50%, #181818);
      background-size: 200% 100%;
      animation: sh 1.4s linear infinite;
    }
    @keyframes sh { to { background-position: -200% 0; } }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      color: var(--text);
      box-shadow: 0 10px 30px rgba(0,0,0,.6);
      animation: slideUp .3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Footer ===== */
    footer {
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 30px 20px;
      text-align: center;
    }

    /* ===== Responsive tweaks ===== */
    @media (max-width: 600px) {
      .nav-inner { gap: 12px; }
      .nav-links .nav-link { font-size: 12px; padding: 6px 10px; }
      .search { min-width: 140px; }
    }
  </style>
</head>
<body>
  <header class="nav" role="banner">
    <div class="container nav-inner">
      <a href="#/" class="logo" aria-label="CineStream home">
        <span class="logo-mark" aria-hidden="true"></span> CineStream
      </a>
      <nav class="nav-links" id="navLinks" aria-label="Main navigation">
        <a class="nav-link" href="#/" data-route="/">Home</a>
        <a class="nav-link" href="#/movies" data-route="/movies">Movies</a>
        <a class="nav-link" href="#/tv" data-route="/tv">TV Shows</a>
        <a class="nav-link" href="#/trending" data-route="/trending">Trending</a>
        <a class="nav-link" href="#/mylist" data-route="/mylist">My List</a>
      </nav>
      <form class="search" role="search" aria-label="Search">
        <input name="q" placeholder="Search movies, TV, tt-id…" aria-label="Search query" />
      </form>
    </div>
  </header>

  <main id="app" role="main"></main>

  <footer role="contentinfo">
    <p>© <span id="yr"></span> CineStream · Data by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer">TMDB</a> · Streaming embeds via streamimdb.ru — content not hosted here.</p>
  </footer>

  <div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

  <script>
    (function() {
      "use strict";

      // ========================================================================
      //  CONFIG
      // ========================================================================
      const CONFIG = {
        // ⚠️ Replace with your own key, or better: proxy through your backend!
        TMDB_KEY: '705c91ec231b594b8c6fa21665e801a7',
        TMDB_BASE: 'https://api.themoviedb.org/3',
        IMG_BASE: 'https://image.tmdb.org/t/p/',
        // If you set USE_PROXY to true, prepend '/api/tmdb' to all requests
        // (you'd need to implement that backend). For demo, keep false.
        USE_PROXY: false,
        PROXY_URL: '/api/tmdb',
        DEFAULT_IMAGE_SIZE: 'w500',
        BACKDROP_SIZE: 'original',
      };

      // ========================================================================
      //  UTILITIES
      // ========================================================================
      function $(sel, ctx = document) { return ctx.querySelector(sel); }
      function $$(sel, ctx = document) { return [...ctx.querySelectorAll(sel)]; }

      function el(html) {
        const t = document.createElement('template');
        t.innerHTML = html.trim();
        return t.content.firstElementChild;
      }

      function debounce(fn, delay = 300) {
        let timer;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), delay);
        };
      }

      function showToast(message, duration = 3000) {
        const container = document.getElementById('toastContainer');
        const toast = el(`<div class="toast">${message}</div>`);
        container.appendChild(toast);
        setTimeout(() => { toast.remove(); }, duration);
      }

      function imgUrl(path, size = CONFIG.DEFAULT_IMAGE_SIZE) {
        return path ? `${CONFIG.IMG_BASE}${size}${path}` : '';
      }

      function backdropUrl(path) {
        return path ? `${CONFIG.IMG_BASE}${CONFIG.BACKDROP_SIZE}${path}` : '';
      }

      function normalizeItem(r, forcedType) {
        const type = forcedType || r.media_type || (r.first_air_date ? 'tv' : 'movie');
        if (!type) return null;
        const date = r.release_date || r.first_air_date || '';
        return {
          id: r.id,
          type,
          title: r.title || r.name || 'Untitled',
          year: +date.slice(0, 4) || 0,
          rating: Math.round((r.vote_average || 0) * 10) / 10,
          overview: r.overview || '',
          poster: imgUrl(r.poster_path),
          backdrop: backdropUrl(r.backdrop_path),
          imdb: r.imdb_id || null,
        };
      }

      // ========================================================================
      //  TMDB CLIENT
      // ========================================================================
      const TMDB = {
        async fetch(path, params = {}) {
          const base = CONFIG.USE_PROXY ? CONFIG.PROXY_URL : CONFIG.TMDB_BASE;
          const url = new URL(base + path);
          if (!CONFIG.USE_PROXY) {
            url.searchParams.set('api_key', CONFIG.TMDB_KEY);
          }
          url.searchParams.set('language', 'en-US');
          for (const [k, v] of Object.entries(params)) {
            if (v !== undefined && v !== '') url.searchParams.set(k, v);
          }
          const res = await fetch(url);
          if (!res.ok) throw new Error(`TMDB error ${res.status}`);
          return res.json();
        },
        async getTrending() {
          const data = await this.fetch('/trending/all/week');
          return data.results.map(r => normalizeItem(r)).filter(Boolean);
        },
        async getPopularMovies() {
          const data = await this.fetch('/movie/popular');
          return data.results.map(r => normalizeItem(r, 'movie')).filter(Boolean);
        },
        async getPopularTV() {
          const data = await this.fetch('/tv/popular');
          return data.results.map(r => normalizeItem(r, 'tv')).filter(Boolean);
        },
        async getTopRated() {
          const data = await this.fetch('/movie/top_rated');
          return data.results.map(r => normalizeItem(r, 'movie')).filter(Boolean);
        },
        async getDiscover(type, page = 1, genre = null) {
          const params = { sort_by: 'popularity.desc', 'vote_count.gte': 50, page };
          if (genre) params.with_genres = genre;
          const data = await this.fetch(`/discover/${type}`, params);
          return {
            results: data.results.map(r => normalizeItem(r, type)).filter(Boolean),
            total_pages: data.total_pages,
            page: data.page,
          };
        },
        async getGenres(type) {
          const data = await this.fetch(`/genre/${type}/list`);
          return data.genres || [];
        },
        async getByGenre(type, genreId, page = 1) {
          return this.getDiscover(type, page, genreId);
        },
        async search(query) {
          if (/^tt\d+$/i.test(query)) {
            const data = await this.fetch('/find/' + query, { external_source: 'imdb_id' });
            const items = [
              ...(data.movie_results || []).map(r => normalizeItem(r, 'movie')),
              ...(data.tv_results || []).map(r => normalizeItem(r, 'tv')),
            ];
            return items.filter(Boolean);
          } else {
            const data = await this.fetch('/search/multi', { query });
            return data.results.map(r => normalizeItem(r)).filter(Boolean);
          }
        },
        async getDetails(type, id) {
          return this.fetch(`/${type}/${id}`, { append_to_response: 'credits,external_ids,similar' });
        },
      };

      // ========================================================================
      //  STORE (localStorage)
      // ========================================================================
      const Store = {
        key: 'cinestream-mylist-v2',
        get() {
          try { return JSON.parse(localStorage.getItem(this.key)) || []; }
          catch { return []; }
        },
        save(list) {
          localStorage.setItem(this.key, JSON.stringify(list));
        },
        has(type, id) {
          return this.get().some(x => x.type === type && x.id === id);
        },
        toggle(item) {
          const list = this.get();
          const idx = list.findIndex(x => x.type === item.type && x.id === item.id);
          if (idx >= 0) {
            list.splice(idx, 1);
            showToast(`Removed "${item.title}" from My List`);
          } else {
            list.unshift({ id: item.id, type: item.type, title: item.title, poster: item.poster, year: item.year, rating: item.rating });
            showToast(`Added "${item.title}" to My List`);
          }
          this.save(list);
          return list;
        },
      };

      // ========================================================================
      //  ROUTER
      // ========================================================================
      const ROUTES = {
        HOME: '/',
        MOVIES: '/movies',
        TV: '/tv',
        TRENDING: '/trending',
        MYLIST: '/mylist',
        SEARCH: '/search',
        TITLE: '/title/:type/:id',
        WATCH: '/watch/:type/:imdb',
      };

      function parseRoute() {
        const raw = (location.hash || '#/').slice(1);
        const [path, qs] = raw.split('?');
        const params = Object.fromEntries(new URLSearchParams(qs || ''));
        const segs = path.split('/').filter(Boolean);
        return { path: '/' + segs.join('/'), segs, params };
      }

      let currentPage = null;

      function navigate(hash) {
        location.hash = hash.replace(/^#/, '') || '/';
      }

      // ========================================================================
      //  COMPONENTS
      // ========================================================================
      function Card(item, lazy = true) {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = `#/title/${item.type}/${item.id}`;
        a.setAttribute('role', 'article');
        a.setAttribute('aria-label', `${item.title} (${item.year})`);

        const posterDiv = document.createElement('div');
        posterDiv.className = 'poster';
        if (item.poster) {
          const img = document.createElement('img');
          img.src = item.poster;
          img.alt = `${item.title} poster`;
          if (lazy) img.loading = 'lazy';
          posterDiv.appendChild(img);
        } else {
          posterDiv.style.background = '#222';
        }

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = item.type === 'tv' ? 'TV' : 'MOVIE';

        const info = document.createElement('div');
        info.className = 'info';
        info.innerHTML = `
          <div class="title">${item.title}</div>
          <div class="sub">
            <span>${item.year || '—'}</span>
            <span>★ ${item.rating || '—'}</span>
          </div>
        `;

        a.append(posterDiv, badge, info);
        return a;
      }

      function Row(title, items) {
        if (!items || !items.length) return document.createComment('empty row');
        const section = el(`
          <section class="row">
            <div class="row-head"><h2>${title}</h2></div>
            <div class="row-scroller no-scrollbar"></div>
          </section>
        `);
        const scroller = $('.row-scroller', section);
        items.forEach(item => scroller.appendChild(Card(item)));
        return section;
      }

      function SkeletonRow(count = 8) {
        const section = el(`
          <section class="row">
            <div class="row-head"><h2 style="opacity:.4">Loading…</h2></div>
            <div class="row-scroller no-scrollbar"></div>
          </section>
        `);
        const scroller = $('.row-scroller', section);
        for (let i = 0; i < count; i++) {
          const card = el(`<div class="card"><div class="poster skeleton"></div><div class="info"><div class="title skeleton" style="height:12px;border-radius:4px"></div><div class="sub" style="margin-top:8px"><span class="skeleton" style="height:10px;width:60%;border-radius:4px"></span></div></div></div>`);
          scroller.appendChild(card);
        }
        return section;
      }

      // ========================================================================
      //  PAGES
      // ========================================================================
      const Pages = {};

      Pages.home = async function() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        // Hero placeholder
        const hero = el(`
          <section class="hero" aria-label="Featured content">
            <div class="hero-slides"></div>
            <div class="hero-dots" role="tablist" aria-label="Featured slides"></div>
          </section>
        `);
        app.appendChild(hero);

        // Rows container
        const rowsContainer = document.createElement('div');
        app.appendChild(rowsContainer);

        // Show skeleton rows
        rowsContainer.appendChild(SkeletonRow());
        rowsContainer.appendChild(SkeletonRow());

        // Fetch data
        try {
          const [trending, popMovies, popTV, topRated] = await Promise.all([
            TMDB.getTrending(),
            TMDB.getPopularMovies(),
            TMDB.getPopularTV(),
            TMDB.getTopRated(),
          ]);

          // Build featured slides from trending with backdrop
          const featured = trending.filter(i => i.backdrop).slice(0, 5);
          const slidesContainer = $('.hero-slides', hero);
          const dotsContainer = $('.hero-dots', hero);

          featured.forEach((item, index) => {
            const slide = el(`
              <div class="hero-slide${index === 0 ? ' active' : ''}" role="tabpanel" aria-label="${item.title}">
                <div class="hero-bg" style="background-image:url('${item.backdrop}')"></div>
                <div class="hero-grad"></div>
                <div class="container hero-inner">
                  <div class="hero-card">
                    <div class="eyebrow">● Featured ${item.type === 'tv' ? 'Series' : 'Movie'}</div>
                    <h1>${item.title}</h1>
                    <div class="meta">
                      <span class="pill">★ ${item.rating}</span>
                      <span class="pill">${item.year}</span>
                      <span class="pill">${item.type === 'tv' ? 'TV' : 'Movie'}</span>
                    </div>
                    <p>${(item.overview || '').slice(0, 220)}${(item.overview || '').length > 220 ? '…' : ''}</p>
                    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
                      <a class="btn btn-primary" href="#/title/${item.type}/${item.id}">▶️ Watch Now</a>
                      <a class="btn btn-ghost" href="#/title/${item.type}/${item.id}">More info</a>
                    </div>
                  </div>
                </div>
              </div>
            `);
            slidesContainer.appendChild(slide);

            const dot = document.createElement('button');
            dot.setAttribute('role', 'tab');
            dot.setAttribute('aria-label', `Slide ${index + 1}: ${item.title}`);
            dot.className = index === 0 ? 'active' : '';
            dot.addEventListener('click', () => showSlide(index));
            dotsContainer.appendChild(dot);
          });

          let currentSlide = 0;
          const totalSlides = featured.length;
          function showSlide(index) {
            currentSlide = index;
            const slides = $$('.hero-slide', hero);
            const dots = $$('.hero-dots button', hero);
            slides.forEach((s, i) => s.classList.toggle('active', i === index));
            dots.forEach((d, i) => d.classList.toggle('active', i === index));
          }

          // Auto-rotate
          if (totalSlides > 1) {
            let interval = setInterval(() => {
              showSlide((currentSlide + 1) % totalSlides);
            }, 6000);
            // Pause on hover
            hero.addEventListener('mouseenter', () => clearInterval(interval));
            hero.addEventListener('mouseleave', () => {
              interval = setInterval(() => {
                showSlide((currentSlide + 1) % totalSlides);
              }, 6000);
            });
          }

          // Render rows
          rowsContainer.innerHTML = '';
          rowsContainer.appendChild(Row('Trending This Week', trending.slice(0, 18)));
          rowsContainer.appendChild(Row('Popular Movies', popMovies.slice(0, 18)));
          rowsContainer.appendChild(Row('Popular TV Shows', popTV.slice(0, 18)));
          rowsContainer.appendChild(Row('Top Rated Movies', topRated.slice(0, 18)));

        } catch (err) {
          rowsContainer.innerHTML = `<p style="color:var(--muted);padding:20px">Failed to load content: ${err.message}</p>`;
        }
      };

      Pages.browse = async function(type) {
        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="container page">
            <h1>${type === 'movie' ? 'Movies' : 'TV Shows'}</h1>
            <p class="sub">Browse and filter by genre.</p>
            <div class="chips" id="chips" role="tablist" aria-label="Genre filters"></div>
            <div class="grid" id="grid" role="list"></div>
            <button class="load-more" id="loadMore">Load More</button>
          </div>
        `;

        let currentPage = 1;
        let totalPages = 1;
        let currentGenre = null;
        let isLoading = false;

        const chipsContainer = $('#chips');
        const grid = $('#grid');
        const loadMoreBtn = $('#loadMore');

        // Fetch genres
        let genres = [];
        try {
          genres = await TMDB.getGenres(type);
        } catch (e) { /* ignore */ }

        // Add "All" chip
        function addChip(label, value) {
          const chip = document.createElement('button');
          chip.className = 'chip' + (value === currentGenre ? ' active' : '');
          chip.setAttribute('role', 'tab');
          chip.textContent = label;
          chip.addEventListener('click', async () => {
            currentGenre = value;
            currentPage = 1;
            await loadItems();
            // Update chip styles
            $$('.chip', chipsContainer).forEach(c => c.classList.toggle('active', c.dataset.value == value));
          });
          chip.dataset.value = value;
          chipsContainer.appendChild(chip);
        }
        addChip('All', null);
        genres.forEach(g => addChip(g.name, g.id));

        async function loadItems() {
          if (isLoading) return;
          isLoading = true;
          loadMoreBtn.disabled = true;
          loadMoreBtn.textContent = 'Loading…';

          try {
            const result = await TMDB.getDiscover(type, currentPage, currentGenre);
            const items = result.results;
            totalPages = result.total_pages;

            if (currentPage === 1) {
              grid.innerHTML = '';
            }
            items.forEach(item => {
              grid.appendChild(Card(item));
            });

            loadMoreBtn.style.display = (currentPage < totalPages) ? 'block' : 'none';
            currentPage++;
          } catch (err) {
            showToast('Failed to load: ' + err.message);
          } finally {
            isLoading = false;
            loadMoreBtn.disabled = false;
            loadMoreBtn.textContent = 'Load More';
          }
        }

        loadMoreBtn.addEventListener('click', loadItems);

        // Initial load
        await loadItems();
      };

      Pages.trending = async function() {
        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="container page">
            <h1>Trending</h1>
            <p class="sub">What everyone is watching this week.</p>
            <div class="grid" id="g" role="list"></div>
          </div>
        `;
        try {
          const items = await TMDB.getTrending();
          const grid = $('#g');
          items.forEach(item => grid.appendChild(Card(item)));
        } catch (err) {
          $('#g').outerHTML = `<p style="color:var(--muted)">Failed to load trending: ${err.message}</p>`;
        }
      };

      Pages.myList = function() {
        const app = document.getElementById('app');
        const items = Store.get();
        app.innerHTML = `
          <div class="container page">
            <h1>My List</h1>
            <p class="sub">Saved titles on this device.</p>
            <div class="grid" id="g" role="list"></div>
          </div>
        `;
        const grid = $('#g');
        if (!items.length) {
          grid.outerHTML = `<p style="color:var(--muted)">Nothing saved yet — explore and tap “Add to My List”.</p>`;
          return;
        }
        items.forEach(item => {
          const card = Card(item);
          // Add a remove button?
          const removeBtn = document.createElement('button');
          removeBtn.textContent = '✕';
          removeBtn.style.cssText = 'position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border-radius:50%;width:28px;height:28px;font-size:14px;color:#fff;border:1px solid var(--border);';
          removeBtn.setAttribute('aria-label', `Remove ${item.title} from list`);
          removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            Store.toggle(item);
            // Re-render list
            Pages.myList();
          });
          card.querySelector('.poster').appendChild(removeBtn);
          grid.appendChild(card);
        });
      };

      Pages.search = async function(query) {
        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="container page">
            <h1>Search</h1>
            <p class="sub">${query ? `Results for “${query}”` : 'Type something to search'}</p>
            <div class="grid" id="g" role="list"></div>
          </div>
        `;
        if (!query) return;
        try {
          const items = await TMDB.search(query);
          const grid = $('#g');
          if (!items.length) {
            grid.outerHTML = `<p style="color:var(--muted)">No results found.</p>`;
            return;
          }
          items.forEach(item => grid.appendChild(Card(item)));
        } catch (err) {
          $('#g').outerHTML = `<p style="color:var(--muted)">Search failed: ${err.message}</p>`;
        }
      };

      Pages.title = async function(type, id) {
        const app = document.getElementById('app');
        app.innerHTML = `
          <section class="detail-bg"><div class="bg skeleton"></div><div class="grad"></div></section>
          <div class="container detail-inner">
            <div class="detail-poster skeleton"></div>
            <div class="detail"><h1 class="skeleton" style="height:34px;border-radius:8px"></h1></div>
          </div>
          <div class="container" style="margin-top:30px" id="similarRow"></div>
        `;

        try {
          const data = await TMDB.getDetails(type, id);
          const date = data.release_date || data.first_air_date || '';
          const item = {
            id: data.id,
            type,
            title: data.title || data.name || 'Untitled',
            year: +date.slice(0, 4) || 0,
            rating: Math.round((data.vote_average || 0) * 10) / 10,
            overview: data.overview || '',
            poster: imgUrl(data.poster_path),
            backdrop: backdropUrl(data.backdrop_path),
            imdb: data.imdb_id || data.external_ids?.imdb_id || null,
            genres: (data.genres || []).map(g => g.name),
            cast: (data.credits?.cast || []).slice(0, 8).map(c => c.name),
            runtime: data.runtime || data.episode_run_time?.[0] || 0,
            seasons: data.number_of_seasons,
          };

          const saved = Store.has(type, id);

          // Build detail view
          const bg = $('.detail-bg .bg');
          bg.className = 'bg';
          bg.style.backgroundImage = `url('${item.backdrop}')`;

          const poster = $('.detail-poster');
          poster.className = 'detail-poster';
          poster.style.backgroundImage = `url('${item.poster}')`;

          const detail = $('.detail');
          detail.innerHTML = `
            <div class="eyebrow">● ${type === 'tv' ? 'Series' : 'Movie'}</div>
            <h1>${item.title}</h1>
            <div class="meta">
              <span class="pill">★ ${item.rating}</span>
              <span class="pill">${item.year || '—'}</span>
              ${item.runtime ? `<span class="pill">${Math.floor(item.runtime/60) ? Math.floor(item.runtime/60)+'h ' : ''}${item.runtime%60}m</span>` : ''}
              ${item.seasons ? `<span class="pill">${item.seasons} season${item.seasons>1?'s':''}</span>` : ''}
              ${item.genres.slice(0,3).map(g => `<span class="pill">${g}</span>`).join('')}
            </div>
            <p style="color:#dcdcdc;max-width:720px">${item.overview}</p>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
              ${item.imdb ? `<a class="btn btn-primary" href="#/watch/${type}/${item.imdb}">▶️ Play</a>` : `<span class="btn btn-ghost" style="opacity:.6">Player unavailable</span>`}
              <button class="btn btn-ghost" id="saveBtn">${saved ? '✓ In My List' : '＋ Add to My List'}</button>
            </div>
            ${item.cast.length ? `<p class="cast"><b style="color:#fff">Cast:</b> ${item.cast.join(', ')}</p>` : ''}
          `;

          const saveBtn = $('#saveBtn', detail);
          saveBtn.addEventListener('click', () => {
            Store.toggle(item);
            const nowSaved = Store.has(type, id);
            saveBtn.textContent = nowSaved ? '✓ In My List' : '＋ Add to My List';
          });

          // Similar
          const similarItems = (data.similar?.results || []).map(r => normalizeItem(r, type)).filter(Boolean).slice(0, 18);
          const similarContainer = $('#similarRow');
          if (similarItems.length) {
            similarContainer.appendChild(Row('More like this', similarItems));
          } else {
            similarContainer.remove();
          }

        } catch (err) {
          app.innerHTML = `
            <div class="container page">
              <h1>Error</h1>
              <p class="sub">${err.message}</p>
              <a class="btn btn-primary" href="#/">Go home</a>
            </div>
          `;
        }
      };

      Pages.watch = function(type, imdb) {
        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="player-wrap">
            <div style="display:flex;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
              <button class="btn btn-ghost" id="backBtn">← Back</button>
              <button class="btn btn-ghost" id="fullscreenBtn">⛶ Fullscreen</button>
            </div>
            <div class="player" id="playerContainer">
              <div class="loading" id="loadingSpinner">
                <div class="spinner"></div>
                <span>Loading player…</span>
              </div>
              <iframe id="playerFrame"
                src="https://streamimdb.ru/embed/${type}/${imdb}"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen
                title="Video player"
              ></iframe>
            </div>
            <p style="color:var(--muted);font-size:12px;margin-top:14px">
              Source: streamimdb.ru/embed/${type}/${imdb} · CineStream does not host this content.
              <br>If the player fails, try <a href="https://streamimdb.ru/embed/${type}/${imdb}" target="_blank" rel="noopener noreferrer">opening directly</a>.
            </p>
          </div>
        `;

        const iframe = document.getElementById('playerFrame');
        const spinner = document.getElementById('loadingSpinner');

        iframe.addEventListener('load', () => {
          if (spinner) spinner.remove();
        });

        // Fallback: if iframe fails to load within 10s, show error
        setTimeout(() => {
          if (spinner) {
            spinner.innerHTML = `
              <span style="color:var(--primary)">⏳ Player taking long? <br> <a href="https://streamimdb.ru/embed/${type}/${imdb}" target="_blank" rel="noopener">Try direct link</a></span>
            `;
          }
        }, 10000);

        document.getElementById('backBtn').addEventListener('click', () => history.back());
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
          const container = document.getElementById('playerContainer');
          if (container.requestFullscreen) container.requestFullscreen();
          else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        });
      };

      // ========================================================================
      //  RENDER ENGINE
      // ========================================================================
      async function render() {
        const app = document.getElementById('app');
        try {
          const { path, segs, params } = parseRoute();
          // Update nav active
          const activeRoute = '/' + (segs[0] || '');
          $$('.nav-link').forEach(a => {
            a.classList.toggle('active', a.dataset.route === activeRoute || (activeRoute.startsWith('/title') && a.dataset.route === '/'));
          });

          if (!segs.length) {
            await Pages.home();
          } else if (segs[0] === 'movies') {
            await Pages.browse('movie');
          } else if (segs[0] === 'tv') {
            await Pages.browse('tv');
          } else if (segs[0] === 'trending') {
            await Pages.trending();
          } else if (segs[0] === 'mylist') {
            Pages.myList();
          } else if (segs[0] === 'search') {
            await Pages.search(params.q || '');
          } else if (segs[0] === 'title' && segs[1] && segs[2]) {
            await Pages.title(segs[1], +segs[2]);
          } else if (segs[0] === 'watch' && segs[1] && segs[2]) {
            Pages.watch(segs[1], segs[2]);
          } else {
            app.innerHTML = `
              <div class="container page">
                <h1>Page not found</h1>
                <a class="btn btn-ghost" href="#/">Go home</a>
              </div>
            `;
          }
        } catch (err) {
          console.error(err);
          app.innerHTML = `
            <div class="container page">
              <h1>Something went wrong</h1>
              <p class="sub">${err.message}</p>
              <a class="btn btn-primary" href="#/">Back to home</a>
            </div>
          `;
        }
      }

      // ========================================================================
      //  SEARCH DEBOUNCE
      // ========================================================================
      const searchInput = document.querySelector('.search input');
      searchInput.addEventListener('input', debounce((e) => {
        const q = e.target.value.trim();
        if (q.length > 2) {
          navigate(`#/search?q=${encodeURIComponent(q)}`);
        } else if (q === '') {
          // Optionally go home? We'll leave as is.
        }
      }, 400));

      // Also allow enter to submit immediately
      document.querySelector('.search').addEventListener('submit', (e) => {
        e.preventDefault();
        const q = searchInput.value.trim();
        if (q) navigate(`#/search?q=${encodeURIComponent(q)}`);
      });

      // ========================================================================
      //  ROUTE LISTENER
      // ========================================================================
      window.addEventListener('hashchange', render);
      window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('yr').textContent = new Date().getFullYear();
        render();
      });

      // ========================================================================
      //  KEYBOARD SHORTCUT: focus search with "/"
      // ========================================================================
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
          e.preventDefault();
          searchInput.focus();
        }
      });

    })();
  </script>
</body>
</html>
